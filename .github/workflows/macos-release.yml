name: macOS Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build macOS universal binaries
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build
        run: cmake --build build --config Release

      - name: Verify universal binaries
        run: |
          file build/split700 build/brr2wav
          lipo -info build/split700
          lipo -info build/brr2wav

      - name: Stage release artifacts
        run: |
          mkdir -p dist/split700-macos
          cp build/split700 build/brr2wav dist/split700-macos/
          cp README.md LICENSE dist/split700-macos/
          cd dist
          zip -r split700-macos-universal.zip split700-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: split700-macos-universal
          path: dist/split700-macos-universal.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/split700-macos-universal.zip
          generate_release_notes: true
